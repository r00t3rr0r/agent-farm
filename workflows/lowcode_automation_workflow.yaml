id: lowcode_gen_v1
name: n8n/Make-Flow generieren & validieren
trigger_type: csv_upload | api_event
input_schema:
  data_sample: file_path
  business_rule: string
steps:
  - agent_role: automation_architect_agent
    prompt_template: prompts/lowcode_design_system.md
    inference_params:
      temperature: 0.1
      max_tokens: 2500
    tool_calls: [generate_n8n_json]
  - validation:
      type: json_schema
      schema_file: schemas/workflow_schema.json
  - execution:
      tool: "n8n-cli import --dry-run"
      timeout_sec: 30
fallback: rollback_to_template
stability_flags:
  deterministic: true
  retry_on_syntax_error: true
  max_retries: 3
